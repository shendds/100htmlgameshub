<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Dots and Boxes | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 24px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #64748b;
            align-items: center
        }

        .score-p {
            padding: 6px 14px;
            border-radius: 999px;
            font-weight: 700;
            border: 2px solid
        }

        .score-p.p1 {
            border-color: #7c3aed;
            color: #c4b5fd
        }

        .score-p.p2 {
            border-color: #06b6d4;
            color: #67e8f9
        }

        .score-p.active {
            box-shadow: 0 0 14px currentColor
        }

        canvas {
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5)
        }

        .btn {
            margin-top: 12px;
            padding: 10px 22px;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: transform .15s
        }

        .btn:hover {
            transform: scale(1.05)
        }

        #msg {
            margin-top: 10px;
            font-size: 1rem;
            color: #64748b;
            min-height: 24px;
            text-align: center;
            font-weight: 600
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>📐 Dots and Boxes</h1>
    <div class="info">
        <div class="score-p p1 active" id="sp1">🟣 P1: <b id="s1">0</b></div>
        <div class="score-p p2" id="sp2">🔵 P2: <b id="s2">0</b></div>
    </div>
    <canvas id="c" width="400" height="400"></canvas>
    <div id="msg">Player 1's turn — click between dots to draw a line</div>
    <button class="btn" id="newBtn">🔄 New Game</button>
    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d');
        const N = 5, GAP = 70, PAD = 40, DOT = 6, COLORS = ['#7c3aed', '#06b6d4'], FILLS = ['rgba(124,58,237,0.15)', 'rgba(6,182,212,0.15)'];
        let hLines, vLines, boxes, turn, scores;

        function init() { hLines = Array.from({ length: N + 1 }, () => Array(N).fill(-1)); vLines = Array.from({ length: N }, () => Array(N + 1).fill(-1)); boxes = Array.from({ length: N }, () => Array(N).fill(-1)); turn = 0; scores = [0, 0]; document.getElementById('s1').textContent = 0; document.getElementById('s2').textContent = 0; document.getElementById('msg').textContent = "Player 1's turn"; document.getElementById('sp1').classList.add('active'); document.getElementById('sp2').classList.remove('active'); draw(); }

        function draw() {
            ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, 400, 400);
            // boxes
            for (let r = 0; r < N; r++)for (let cc = 0; cc < N; cc++)if (boxes[r][cc] >= 0) { ctx.fillStyle = FILLS[boxes[r][cc]]; ctx.fillRect(PAD + cc * GAP + 2, PAD + r * GAP + 2, GAP - 4, GAP - 4); }
            // lines
            for (let r = 0; r <= N; r++)for (let cc = 0; cc < N; cc++) { ctx.strokeStyle = hLines[r][cc] >= 0 ? COLORS[hLines[r][cc]] : 'rgba(255,255,255,0.08)'; ctx.lineWidth = hLines[r][cc] >= 0 ? 4 : 2; ctx.beginPath(); ctx.moveTo(PAD + cc * GAP, PAD + r * GAP); ctx.lineTo(PAD + (cc + 1) * GAP, PAD + r * GAP); ctx.stroke(); }
            for (let r = 0; r < N; r++)for (let cc = 0; cc <= N; cc++) { ctx.strokeStyle = vLines[r][cc] >= 0 ? COLORS[vLines[r][cc]] : 'rgba(255,255,255,0.08)'; ctx.lineWidth = vLines[r][cc] >= 0 ? 4 : 2; ctx.beginPath(); ctx.moveTo(PAD + cc * GAP, PAD + r * GAP); ctx.lineTo(PAD + cc * GAP, PAD + (r + 1) * GAP); ctx.stroke(); }
            // dots
            for (let r = 0; r <= N; r++)for (let cc = 0; cc <= N; cc++) { ctx.fillStyle = '#e2e8f0'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 4; ctx.beginPath(); ctx.arc(PAD + cc * GAP, PAD + r * GAP, DOT, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; }
        }

        c.addEventListener('click', e => {
            const rect = c.getBoundingClientRect(); const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            // find nearest line
            let best = null, bd = 40;
            for (let r = 0; r <= N; r++)for (let cc = 0; cc < N; cc++) { if (hLines[r][cc] >= 0) continue; const lx = PAD + cc * GAP + GAP / 2, ly = PAD + r * GAP; const d = Math.hypot(mx - lx, my - ly); if (d < bd) { bd = d; best = { type: 'h', r, c: cc }; } }
            for (let r = 0; r < N; r++)for (let cc = 0; cc <= N; cc++) { if (vLines[r][cc] >= 0) continue; const lx = PAD + cc * GAP, ly = PAD + r * GAP + GAP / 2; const d = Math.hypot(mx - lx, my - ly); if (d < bd) { bd = d; best = { type: 'v', r, c: cc }; } }
            if (!best) return;
            if (best.type === 'h') hLines[best.r][best.c] = turn; else vLines[best.r][best.c] = turn;
            let scored = false;
            for (let r = 0; r < N; r++)for (let cc = 0; cc < N; cc++) { if (boxes[r][cc] >= 0) continue; if (hLines[r][cc] >= 0 && hLines[r + 1][cc] >= 0 && vLines[r][cc] >= 0 && vLines[r][cc + 1] >= 0) { boxes[r][cc] = turn; scores[turn]++; scored = true; } }
            document.getElementById('s1').textContent = scores[0]; document.getElementById('s2').textContent = scores[1];
            if (scores[0] + scores[1] === N * N) { const w = scores[0] > scores[1] ? 'Player 1 wins!' : 'Player 2 wins!'; document.getElementById('msg').textContent = `🏆 ${w} (${scores[0]}-${scores[1]})`; }
            else if (!scored) { turn = 1 - turn; }
            document.getElementById('msg').textContent = `Player ${turn + 1}'s turn`; document.getElementById('sp1').classList.toggle('active', turn === 0); document.getElementById('sp2').classList.toggle('active', turn === 1); draw();
        });
        document.getElementById('newBtn').addEventListener('click', init); init();
    </script>
</body>

</html>
