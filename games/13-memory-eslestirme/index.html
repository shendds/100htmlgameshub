<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Memory Match | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 20px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #64748b
        }

        .info span b {
            color: #a78bfa;
            font-size: 1.2em
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px
        }

        .card {
            width: 80px;
            height: 80px;
            cursor: pointer;
            perspective: 600px
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg)
        }

        .card-front,
        .card-back {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden
        }

        .card-front {
            background: linear-gradient(135deg, #1e1b4b, #2e1065);
            border: 2px solid rgba(124, 58, 237, 0.3);
            font-size: 30px
        }

        .card-back {
            background: linear-gradient(135deg, #12121a, #1e1a30);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transform: rotateY(180deg);
            font-size: 36px
        }

        .card.matched .card-front {
            background: linear-gradient(135deg, #14532d, #15803d);
            border-color: rgba(34, 197, 94, 0.4);
            animation: matchPop .3s ease
        }

        @keyframes matchPop {
            0% {
                transform: rotateY(180deg) scale(1)
            }

            50% {
                transform: rotateY(180deg) scale(1.15)
            }

            100% {
                transform: rotateY(180deg) scale(1)
            }
        }

        .btn {
            padding: 10px 28px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s;
            font-family: 'Outfit', sans-serif
        }

        .btn:hover {
            transform: scale(1.05)
        }

        #msg {
            font-size: 1.1rem;
            min-height: 28px;
            margin-bottom: 12px;
            text-align: center;
            color: #64748b
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🃏 Memory Match</h1>
    <div class="info">
        <span>Moves: <b id="moves">0</b></span>
        <span>Matched: <b id="matched">0</b>/8</span>
        <span>Time: <b id="timer">0</b>s</span>
    </div>
    <div class="grid" id="grid"></div>
    <div id="msg">Match all the cards!</div>
    <button class="btn" id="startBtn">▶ New Game</button>
    <script>
        const EMOJIS = ['🚀', '🦊', '🎸', '🍕', '🌈', '🎯', '🦋', '🍦'];
        let flipped = [], matched = 0, moves = 0, locked = false, timerInt, elapsed = 0, started = false;
        function shuffle(a) { return a.sort(() => Math.random() - .5); }
        function init() {
            clearInterval(timerInt); elapsed = 0; moves = 0; matched = 0; flipped = []; locked = false; started = false;
            document.getElementById('moves').textContent = 0; document.getElementById('matched').textContent = '0/8'; document.getElementById('timer').textContent = 0; document.getElementById('msg').textContent = 'Match all the cards!';
            const pairs = [...EMOJIS, ...EMOJIS]; shuffle(pairs);
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            pairs.forEach((e, i) => {
                const card = document.createElement('div'); card.className = 'card'; card.dataset.emoji = e; card.dataset.idx = i;
                card.innerHTML = `<div class="card-inner"><div class="card-front">❓</div><div class="card-back">${e}</div></div>`;
                card.addEventListener('click', () => {
                    if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
                    if (!started) { started = true; timerInt = setInterval(() => { elapsed++; document.getElementById('timer').textContent = elapsed; }, 1000); }
                    card.classList.add('flipped'); flipped.push(card);
                    if (flipped.length === 2) {
                        moves++; document.getElementById('moves').textContent = moves; locked = true;
                        const [a, b] = flipped;
                        if (a.dataset.emoji === b.dataset.emoji) {
                            a.classList.add('matched'); b.classList.add('matched'); matched++; document.getElementById('matched').textContent = `${matched}/8`; flipped = []; locked = false;
                            if (matched === 8) { clearInterval(timerInt); document.getElementById('msg').textContent = `🏆 Congratulations! ${moves} moves in ${elapsed}s!`; }
                        } else { setTimeout(() => { a.classList.remove('flipped'); b.classList.remove('flipped'); flipped = []; locked = false; }, 900); }
                    }
                });
                grid.appendChild(card);
            });
        }
        document.getElementById('startBtn').addEventListener('click', init);
        init();
    </script>
</body>

</html>
