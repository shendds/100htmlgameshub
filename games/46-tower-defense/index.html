<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Tower Defense | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 12px
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #22c55e, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .top-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #64748b;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center
        }

        .top-bar span b {
            color: #22c55e;
            font-size: 1.1em
        }

        .tower-select {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center
        }

        .tower-opt {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all .15s;
            color: #94a3b8;
            font-family: 'Outfit', sans-serif
        }

        .tower-opt.active {
            border-color: rgba(34, 197, 94, 0.6);
            background: rgba(34, 197, 94, 0.15);
            color: #86efac
        }

        canvas {
            border: 2px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5)
        }

        .btns {
            display: flex;
            gap: 8px;
            margin-top: 10px
        }

        .btn {
            padding: 8px 18px;
            background: linear-gradient(135deg, #22c55e, #10b981);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s;
            font-family: 'Outfit', sans-serif
        }

        .btn:hover {
            transform: scale(1.05)
        }

        .btn.secondary {
            background: linear-gradient(135deg, #f59e0b, #d97706)
        }

        #msg {
            font-size: 0.95rem;
            min-height: 22px;
            text-align: center;
            margin: 6px 0;
            color: #64748b
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🏰 Tower Defense</h1>
    <div class="top-bar">
        <span>💰 Gold: <b id="gold">150</b></span>
        <span>❤️ Lives: <b id="lives">20</b></span>
        <span>🌊 Wave: <b id="wave">1</b></span>
        <span>👾 Score: <b id="score">0</b></span>
    </div>
    <div class="tower-select">
        <button class="tower-opt active" data-type="basic">🗼 Basic ($25)</button>
        <button class="tower-opt" data-type="rapid">⚡ Rapid ($50)</button>
        <button class="tower-opt" data-type="heavy">💣 Heavy ($100)</button>
    </div>
    <canvas id="c" width="560" height="420"></canvas>
    <div id="msg">Click empty tiles to place towers | Start a wave when ready</div>
    <div class="btns">
        <button class="btn secondary" id="waveBtn">▶ Start Wave</button>
        <button class="btn" id="newBtn">🔄 New Game</button>
    </div>
    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d');
        const COLS = 14, ROWS = 10, CELL = 40;
        // Simple path: L-shaped route
        const PATH_CELLS = [[0, 4], [1, 4], [2, 4], [3, 4], [4, 4], [4, 5], [4, 6], [5, 6], [6, 6], [7, 6], [7, 5], [7, 4], [8, 4], [9, 4], [10, 4], [10, 5], [10, 6], [10, 7], [10, 8], [11, 8], [12, 8], [13, 8]];
        const PATH_SET = new Set(PATH_CELLS.map(([c, r]) => `${c},${r}`));

        const TOWER_TYPES = {
            basic: { name: 'Basic', cost: 25, dmg: 10, range: 2, rate: 60, color: '#22c55e', bullet: '#86efac' },
            rapid: { name: 'Rapid', cost: 50, dmg: 5, range: 2.5, rate: 25, color: '#06b6d4', bullet: '#67e8f9' },
            heavy: { name: 'Heavy', cost: 100, dmg: 40, range: 1.8, rate: 120, color: '#ef4444', bullet: '#fca5a5' },
        };

        let grid, towers, enemies, bullets, gold, lives, wave, score, waveRunning, animId, selectedType = 'basic', frame = 0;

        function init() {
            grid = Array.from({ length: ROWS }, (_, r) => Array.from({ length: COLS }, (_, c) => PATH_SET.has(`${c},${r}`) ? 'path' : 'empty'));
            towers = []; enemies = []; bullets = []; gold = 150; lives = 20; wave = 1; score = 0; waveRunning = false; frame = 0;
            update_ui(); document.getElementById('msg').textContent = 'Click tiles to place towers, then start a wave!';
            cancelAnimationFrame(animId); gameLoop();
        }

        function update_ui() { document.getElementById('gold').textContent = gold; document.getElementById('lives').textContent = lives; document.getElementById('wave').textContent = wave; document.getElementById('score').textContent = score; }

        function startWave() {
            if (waveRunning) return; waveRunning = true; document.getElementById('waveBtn').disabled = true;
            const hp = 50 + wave * 30, count = 5 + wave * 3;
            for (let i = 0; i < count; i++) {
                setTimeout(() => { enemies.push({ path: 0, x: PATH_CELLS[0][0] * CELL + 20, y: PATH_CELLS[0][1] * CELL + 20, hp, maxHp: hp, speed: 1 + wave * 0.1, reward: 10 + wave * 2 }); }, i * 1000);
            }
        }

        function update() {
            frame++;
            // Move enemies
            enemies.forEach(e => { const target = PATH_CELLS[Math.min(e.path + 1, PATH_CELLS.length - 1)]; const tx = target[0] * CELL + 20, ty = target[1] * CELL + 20; const dx = tx - e.x, dy = ty - e.y; const d = Math.hypot(dx, dy); if (d < e.speed * 2) { e.path++; if (e.path >= PATH_CELLS.length - 1) { lives--; e.hp = 0; update_ui(); } } else { e.x += dx / d * e.speed * 1.5; e.y += dy / d * e.speed * 1.5; } });
            enemies = enemies.filter(e => e.hp > 0);
            if (waveRunning && enemies.length === 0 && frame > 120) { waveRunning = false; wave++; gold += 30; update_ui(); document.getElementById('waveBtn').disabled = false; document.getElementById('msg').textContent = `Wave ${wave} ready! You earned 30 gold bonus.`; if (lives <= 0) { document.getElementById('msg').textContent = '💀 Game Over! All lives lost.'; waveRunning = true; } }
            // Tower shooting
            towers.forEach(t => { t.cooldown = Math.max(0, (t.cooldown || 0) - 1); if (t.cooldown > 0) return; const tt = TOWER_TYPES[t.type]; const target = enemies.find(e => { const dx = e.x - (t.col * CELL + 20), dy = e.y - (t.row * CELL + 20); return Math.hypot(dx, dy) < tt.range * CELL; }); if (target) { t.cooldown = tt.rate; bullets.push({ x: t.col * CELL + 20, y: t.row * CELL + 20, tx: target, dmg: tt.dmg, color: tt.bullet, type: t.type }); } });
            // Bullets
            bullets.forEach(b => { const dx = b.tx.x - b.x, dy = b.tx.y - b.y; const d = Math.hypot(dx, dy); const speed = b.type === 'rapid' ? 12 : b.type === 'heavy' ? 5 : 8; if (d < speed) { b.tx.hp -= b.dmg; if (b.tx.hp <= 0) { gold += b.tx.reward; score += 10; update_ui(); b.tx.hp = 0; } b.done = true; } else { b.x += dx / d * speed; b.y += dy / d * speed; } });
            bullets = bullets.filter(b => !b.done);
        }

        function draw() {
            ctx.clearRect(0, 0, 560, 420);
            for (let r = 0; r < ROWS; r++)for (let col = 0; col < COLS; col++) {
                const cx = col * CELL, cy = r * CELL;
                ctx.fillStyle = grid[r][col] === 'path' ? '#1e3a1e' : grid[r][col] === 'tower' ? '#0a0a0f' : '#0a150a'; ctx.fillRect(cx, cy, CELL, CELL); ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.5; ctx.strokeRect(cx, cy, CELL, CELL);
            }
            PATH_CELLS.forEach(([pc, pr]) => { ctx.fillStyle = '#2d4d2d'; ctx.fillRect(pc * CELL, pr * CELL, CELL, CELL); });
            // Towers
            towers.forEach(t => { const tt = TOWER_TYPES[t.type]; ctx.fillStyle = tt.color; ctx.shadowColor = tt.color; ctx.shadowBlur = 8; ctx.beginPath(); ctx.arc(t.col * CELL + 20, t.row * CELL + 20, 14, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Outfit'; ctx.textAlign = 'center'; ctx.fillText(t.type[0].toUpperCase(), t.col * CELL + 20, t.row * CELL + 24); });
            // Enemies
            enemies.forEach(e => { ctx.fillStyle = '#ef4444'; ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 6; ctx.beginPath(); ctx.arc(e.x, e.y, 12, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(e.x - 14, e.y - 20, 28, 5); ctx.fillStyle = '#22c55e'; ctx.fillRect(e.x - 14, e.y - 20, 28 * Math.max(0, e.hp / e.maxHp), 5); });
            // Bullets
            bullets.forEach(b => { ctx.fillStyle = b.color; ctx.shadowColor = b.color; ctx.shadowBlur = 8; ctx.beginPath(); ctx.arc(b.x, b.y, b.type === 'heavy' ? 6 : 3, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; });
        }

        function gameLoop() { update(); draw(); animId = requestAnimationFrame(gameLoop); }

        c.addEventListener('click', e => {
            const rect = c.getBoundingClientRect(); const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const col = Math.floor(mx / CELL), row = Math.floor(my / CELL); if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
            if (grid[row][col] !== 'empty') return;
            const tt = TOWER_TYPES[selectedType]; if (gold < tt.cost) { document.getElementById('msg').textContent = 'Not enough gold!'; return; }
            gold -= tt.cost; grid[row][col] = 'tower'; towers.push({ col, row, type: selectedType, cooldown: 0 }); update_ui();
        });

        document.querySelectorAll('.tower-opt').forEach(b => { b.addEventListener('click', () => { document.querySelectorAll('.tower-opt').forEach(x => x.classList.remove('active')); b.classList.add('active'); selectedType = b.dataset.type; }); });
        document.getElementById('waveBtn').addEventListener('click', startWave);
        document.getElementById('newBtn').addEventListener('click', init);
        init();
    </script>
</body>

</html>
