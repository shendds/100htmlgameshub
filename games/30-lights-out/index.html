<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Lights Out | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 24px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #eab308, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 24px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #64748b
        }

        .info span b {
            color: #eab308;
            font-size: 1.2em
        }

        .difficulty {
            display: flex;
            gap: 8px;
            margin-bottom: 14px
        }

        .diff-btn {
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: all .2s
        }

        .diff-btn.active {
            background: rgba(234, 179, 8, 0.3);
            border-color: rgba(234, 179, 8, 0.6);
            color: #fde047
        }

        #grid {
            display: grid;
            gap: 8px;
            margin-bottom: 16px
        }

        .light {
            border-radius: 12px;
            cursor: pointer;
            transition: all .2s;
            border: 2px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            user-select: none
        }

        .light.on {
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.5)
        }

        .btn {
            padding: 10px 22px;
            background: linear-gradient(135deg, #eab308, #f97316);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s;
            font-family: 'Outfit', sans-serif
        }

        .btn:hover {
            transform: scale(1.05)
        }

        #msg {
            font-size: 1rem;
            min-height: 24px;
            margin-bottom: 12px;
            text-align: center;
            color: #64748b;
            font-weight: 700
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }

        .hint {
            font-size: 12px;
            color: #334155;
            margin-top: 8px
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>💡 Lights Out</h1>
    <div class="info">
        <span>Moves: <b id="moves">0</b></span>
        <span>Best: <b id="best">—</b></span>
    </div>
    <div class="difficulty">
        <button class="diff-btn active" data-size="5">5×5</button>
        <button class="diff-btn" data-size="6">6×6</button>
        <button class="diff-btn" data-size="7">7×7</button>
    </div>
    <div id="grid"></div>
    <div id="msg">Toggle lights — turn them all OFF!</div>
    <button class="btn" id="newBtn">🔀 Shuffle</button>
    <div class="hint">Clicking a light toggles it and all adjacent lights</div>
    <script>
        let SIZE = 5, grid, moves, bests = { 5: null, 6: null, 7: null };

        function init() {
            moves = 0; document.getElementById('moves').textContent = 0; document.getElementById('best').textContent = bests[SIZE] || '—'; document.getElementById('msg').textContent = 'Toggle lights — turn them all OFF!';
            // Generate solvable puzzle: apply random valid moves to solved state
            const n = SIZE * SIZE; grid = Array(n).fill(0);
            for (let k = 0; k < 4 + SIZE; k++) { const i = Math.floor(Math.random() * n); toggle(i, false); }
            render();
        }

        function toggle(i, count = true) {
            const r = Math.floor(i / SIZE), c = i % SIZE;
            [[r, c], [r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]].forEach(([nr, nc]) => { if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) grid[nr * SIZE + nc] ^= 1; });
            if (count) { moves++; document.getElementById('moves').textContent = moves; }
            if (grid.every(v => v === 0)) { const b = bests[SIZE]; if (b === null || moves < b) { bests[SIZE] = moves; document.getElementById('best').textContent = moves; } document.getElementById('msg').textContent = `🏆 Solved in ${moves} moves!`; }
            render();
        }

        function render() {
            const el = document.getElementById('grid'); const sz = Math.floor(Math.min(360, window.innerWidth - 80) / SIZE); el.style.gridTemplateColumns = `repeat(${SIZE},${sz}px)`; el.innerHTML = '';
            grid.forEach((v, i) => { const l = document.createElement('div'); l.className = 'light' + (v ? ' on' : ''); l.style.width = sz + 'px'; l.style.height = sz + 'px'; l.style.background = v ? 'linear-gradient(135deg,#eab308,#f59e0b)' : 'rgba(255,255,255,0.04)'; l.style.borderColor = v ? 'rgba(234,179,8,0.6)' : 'rgba(255,255,255,0.06)'; l.textContent = v ? '💡' : ''; l.addEventListener('click', () => toggle(i)); el.appendChild(l); });
        }

        document.querySelectorAll('.diff-btn').forEach(b => { b.addEventListener('click', () => { document.querySelectorAll('.diff-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); SIZE = parseInt(b.dataset.size); init(); }); });
        document.getElementById('newBtn').addEventListener('click', init);
        init();
    </script>
</body>

</html>
