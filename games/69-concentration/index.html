<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Concentration | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 24px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #64748b
        }

        .info b {
            color: #7c3aed;
            font-size: 1.2em
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 70px);
            gap: 8px;
            margin-bottom: 14px
        }

        .cell {
            width: 70px;
            height: 90px;
            border-radius: 10px;
            background: linear-gradient(135deg, #1e3a5f, #0f172a);
            border: 2px solid rgba(124, 58, 237, 0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: all .2s;
            user-select: none
        }

        .cell.flip {
            background: #fff;
            border-color: #7c3aed
        }

        .cell.match {
            background: rgba(34, 197, 94, 0.15);
            border-color: #22c55e;
            cursor: default
        }

        #msg {
            font-size: 1rem;
            font-weight: 700;
            min-height: 28px;
            text-align: center;
            margin-bottom: 8px;
            color: #64748b
        }

        .btn {
            padding: 10px 22px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: transform .15s
        }

        .btn:hover {
            transform: scale(1.05)
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🧠 Concentration</h1>
    <div class="info"><span>Pairs: <b id="pairs">0</b>/12</span><span>Moves: <b id="moves">0</b></span></div>
    <div class="grid" id="grid"></div>
    <div id="msg">Find all matching pairs!</div>
    <button class="btn" id="newBtn">🔀 New Game</button>
    <script>
        const EMOJIS = ['🎮', '🎲', '🎯', '🏆', '💎', '🎪', '🎭', '🎨', '🎵', '🚀', '🌈', '⚡'];
        let cards, first, second, locked, pairs, moves;

        function init() {
            const pool = [...EMOJIS, ...EMOJIS].sort(() => Math.random() - .5); cards = pool.map(e => ({ emoji: e, flip: false, match: false })); first = null; second = null; locked = false; pairs = 0; moves = 0; document.getElementById('pairs').textContent = '0'; document.getElementById('moves').textContent = '0'; document.getElementById('msg').textContent = 'Find matching pairs!'; render();
        }

        function flip(i) {
            if (locked || cards[i].flip || cards[i].match) return; cards[i].flip = true;
            if (!first) { first = i; } else {
                second = i; locked = true; moves++; document.getElementById('moves').textContent = moves;
                if (cards[first].emoji === cards[second].emoji) { cards[first].match = true; cards[second].match = true; pairs++; document.getElementById('pairs').textContent = pairs; first = null; second = null; locked = false; if (pairs === 12) document.getElementById('msg').textContent = `🏆 All pairs found in ${moves} moves!`; }
                else { setTimeout(() => { cards[first].flip = false; cards[second].flip = false; first = null; second = null; locked = false; render(); }, 800); }
            } render();
        }

        function render() {
            const el = document.getElementById('grid'); el.innerHTML = '';
            cards.forEach((c, i) => { const cell = document.createElement('div'); cell.className = 'cell' + (c.flip || c.match ? ' flip' : '') + (c.match ? ' match' : ''); cell.textContent = c.flip || c.match ? c.emoji : ''; cell.addEventListener('click', () => flip(i)); el.appendChild(cell); });
        }

        document.getElementById('newBtn').addEventListener('click', init); init();
    </script>
</body>

</html>
