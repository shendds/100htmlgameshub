<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Color Picker Game | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 24px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ec4899, #f97316, #eab308, #22c55e, #06b6d4, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #64748b
        }

        .info span b {
            color: #ec4899;
            font-size: 1.2em
        }

        .target {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px
        }

        .target-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #64748b
        }

        .target-swatch {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5)
        }

        .target-hex {
            font-size: 13px;
            color: #64748b;
            font-weight: 700
        }

        .sliders {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center
        }

        .slider-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px
        }

        .slider-label {
            font-size: 13px;
            font-weight: 700;
            width: 40px;
            text-align: center
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 200px;
            height: 8px;
            border-radius: 999px;
            outline: none;
            cursor: pointer
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer
        }

        #rSlider {
            background: linear-gradient(90deg, #000, #ff0000)
        }

        #rSlider::-webkit-slider-thumb {
            background: #ef4444
        }

        #gSlider {
            background: linear-gradient(90deg, #000, #00ff00)
        }

        #gSlider::-webkit-slider-thumb {
            background: #22c55e
        }

        #bSlider {
            background: linear-gradient(90deg, #000, #0000ff)
        }

        #bSlider::-webkit-slider-thumb {
            background: #3b82f6
        }

        .compare {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 20px
        }

        .guess-swatch {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4)
        }

        .accuracy {
            font-size: 2.5rem;
            font-weight: 900
        }

        .btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #ec4899, #7c3aed);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s;
            font-family: 'Outfit', sans-serif
        }

        .btn:hover {
            transform: scale(1.05)
        }

        #msg {
            font-size: 1rem;
            min-height: 24px;
            text-align: center;
            margin-bottom: 12px;
            color: #64748b;
            font-weight: 700
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🌈 Color Picker</h1>
    <div class="info"><span>Score: <b id="score">0</b></span><span>Best: <b id="best">0</b></span><span>Round: <b
                id="round">1</b></span></div>
    <div class="target">
        <div class="target-label">🎯 Match This Color</div>
        <div class="target-swatch" id="targetSwatch"></div>
        <div class="target-hex" id="targetHex">#??????</div>
    </div>
    <div class="sliders">
        <div class="slider-col">
            <div class="slider-label" style="color:#ef4444">R: <span id="rVal">128</span></div><input type="range"
                id="rSlider" min="0" max="255" value="128" />
        </div>
        <div class="slider-col">
            <div class="slider-label" style="color:#22c55e">G: <span id="gVal">128</span></div><input type="range"
                id="gSlider" min="0" max="255" value="128" />
        </div>
        <div class="slider-col">
            <div class="slider-label" style="color:#3b82f6">B: <span id="bVal">128</span></div><input type="range"
                id="bSlider" min="0" max="255" value="128" />
        </div>
    </div>
    <div class="compare">
        <div class="guess-swatch" id="guessSwatch" style="background:rgb(128,128,128)"></div>
        <div>
            <div class="accuracy" id="accuracy" style="color:#f59e0b">—</div>
            <div style="font-size:12px;color:#64748b">Match %</div>
        </div>
    </div>
    <div id="msg">Adjust the RGB sliders to match the target color!</div>
    <div style="display:flex;gap:10px"><button class="btn" id="submitBtn">✓ Submit</button><button class="btn"
            style="background:linear-gradient(135deg,#475569,#64748b)" id="nextBtn">⏭ Skip</button></div>
    <script>
        let target, score = 0, best = 0, round = 1;
        function rnd() { return Math.floor(Math.random() * 256); }
        function hex(r, g, b) { return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join(''); }
        function sim(t, g) { const d = Math.sqrt((t[0] - g[0]) ** 2 + (t[1] - g[1]) ** 2 + (t[2] - g[2]) ** 2); return Math.max(0, 100 - Math.round(d / 4.41)); }

        function newRound() { target = [rnd(), rnd(), rnd()]; document.getElementById('targetSwatch').style.background = `rgb(${target.join(',')})`; document.getElementById('targetHex').textContent = hex(...target); document.getElementById('msg').textContent = 'Adjust the sliders to match!'; update(); }

        function update() {
            const r = parseInt(document.getElementById('rSlider').value), g = parseInt(document.getElementById('gSlider').value), b = parseInt(document.getElementById('bSlider').value);
            document.getElementById('rVal').textContent = r; document.getElementById('gVal').textContent = g; document.getElementById('bVal').textContent = b;
            document.getElementById('guessSwatch').style.background = `rgb(${r},${g},${b})`;
            const s = sim(target, [r, g, b]); document.getElementById('accuracy').textContent = s + '%'; document.getElementById('accuracy').style.color = s >= 80 ? '#22c55e' : s >= 50 ? '#f59e0b' : '#ef4444';
        }

        document.querySelectorAll('input[type=range]').forEach(s => s.addEventListener('input', update));
        document.getElementById('submitBtn').addEventListener('click', () => { const s = parseInt(document.getElementById('accuracy').textContent); score += s; if (score > best) best = score; document.getElementById('score').textContent = score; document.getElementById('best').textContent = best; document.getElementById('msg').textContent = s >= 90 ? '🏆 Excellent!' : s >= 70 ? '✅ Good match!' : s >= 50 ? '👍 Decent!' : '❌ Keep practicing!'; round++; document.getElementById('round').textContent = round; setTimeout(newRound, 900); });
        document.getElementById('nextBtn').addEventListener('click', () => { round++; document.getElementById('round').textContent = round; newRound(); });
        newRound();
    </script>
</body>

</html>
