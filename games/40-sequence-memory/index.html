<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Sequence Memory | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 24px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #f59e0b, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #64748b
        }

        .info b {
            color: #f59e0b;
            font-size: 1.2em
        }

        .number-display {
            font-size: 4rem;
            font-weight: 900;
            color: #f59e0b;
            margin: 24px 0;
            min-height: 80px;
            letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(245, 158, 11, 0.3)
        }

        .sub {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 16px
        }

        .input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center
        }

        input[type=text] {
            width: 240px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 12px 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 900;
            letter-spacing: 6px;
            outline: none
        }

        input[type=text]:focus {
            border-color: rgba(245, 158, 11, 0.5)
        }

        .btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #f59e0b, #ec4899);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: transform .15s
        }

        .btn:hover {
            transform: scale(1.05)
        }

        #msg {
            font-size: 1rem;
            font-weight: 700;
            min-height: 28px;
            text-align: center;
            margin-bottom: 8px;
            color: #64748b
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🧠 Sequence Memory</h1>
    <div class="info"><span>Level: <b id="level">1</b></span><span>Best: <b id="best">0</b></span></div>
    <div class="number-display" id="numDisplay">Ready?</div>
    <div class="sub" id="sub">Press Start to begin!</div>
    <div class="input-area"><input type="text" id="answer" placeholder="Type the number..." maxlength="20"
            disabled /><button class="btn" id="submitBtn" disabled>✓</button></div>
    <div id="msg"></div>
    <button class="btn" id="startBtn">▶ Start</button>
    <script>
        let sequence = '', level = 1, best = 0, showTime;
        function genSeq(len) { let s = ''; for (let i = 0; i < len; i++)s += Math.floor(Math.random() * 10); return s; }
        function start() { level = 1; document.getElementById('level').textContent = 1; document.getElementById('startBtn').style.display = 'none'; nextRound(); }
        function nextRound() {
            const len = 3 + level; sequence = genSeq(len); showTime = 1500 + level * 200;
            document.getElementById('numDisplay').textContent = sequence; document.getElementById('sub').textContent = `Remember this ${len}-digit number!`; document.getElementById('answer').value = ''; document.getElementById('answer').disabled = true; document.getElementById('submitBtn').disabled = true; document.getElementById('msg').textContent = '';
            setTimeout(() => { document.getElementById('numDisplay').textContent = '?'.repeat(len); document.getElementById('sub').textContent = 'Type the number from memory!'; document.getElementById('answer').disabled = false; document.getElementById('submitBtn').disabled = false; document.getElementById('answer').focus(); }, showTime);
        }
        function check() {
            const ans = document.getElementById('answer').value.trim(); if (ans === sequence) { level++; document.getElementById('level').textContent = level; if (level - 1 > best) { best = level - 1; document.getElementById('best').textContent = best; } document.getElementById('msg').textContent = '✅ Correct!'; document.getElementById('msg').style.color = '#22c55e'; document.getElementById('numDisplay').textContent = sequence; setTimeout(nextRound, 900); }
            else { document.getElementById('msg').textContent = `❌ Wrong! It was: ${sequence}`; document.getElementById('msg').style.color = '#ef4444'; document.getElementById('numDisplay').textContent = sequence; document.getElementById('startBtn').style.display = ''; document.getElementById('startBtn').textContent = '▶ Try Again'; }
        }
        document.getElementById('submitBtn').addEventListener('click', check); document.getElementById('answer').addEventListener('keydown', e => { if (e.key === 'Enter') check(); }); document.getElementById('startBtn').addEventListener('click', start);
    </script>
</body>

</html>
