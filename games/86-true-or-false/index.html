<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>True or False | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 24px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #22c55e, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #64748b
        }

        .stats span b {
            font-size: 1.2em;
            color: #e2e8f0
        }

        .timer-bar {
            width: 480px;
            max-width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 999px;
            margin-bottom: 20px;
            overflow: hidden
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444);
            border-radius: 999px;
            transition: width .1s
        }

        .category-badge {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #94a3b8;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: inline-block
        }

        .question {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 28px;
            text-align: center;
            max-width: 480px;
            color: #f1f5f9;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .choice-btns {
            display: flex;
            gap: 16px;
            margin-bottom: 20px
        }

        .choice-btn {
            width: 180px;
            height: 80px;
            font-size: 1.5rem;
            font-weight: 900;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all .15s;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1px
        }

        .choice-btn.true-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3)
        }

        .choice-btn.false-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.3)
        }

        .choice-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.3)
        }

        .choice-btn:disabled {
            cursor: default;
            opacity: 0.5
        }

        .choice-btn.correct {
            animation: bounce .3s ease
        }

        .choice-btn.wrong {
            animation: shake .3s ease
        }

        @keyframes bounce {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.15)
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-8px)
            }

            75% {
                transform: translateX(8px)
            }
        }

        .progress {
            display: flex;
            gap: 4px;
            margin-bottom: 12px
        }

        .prog-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1)
        }

        .prog-dot.correct {
            background: #22c55e
        }

        .prog-dot.wrong {
            background: #ef4444
        }

        #feedback {
            font-size: 1rem;
            font-weight: 700;
            min-height: 28px;
            text-align: center;
            margin-bottom: 8px
        }

        .btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #22c55e, #ef4444);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s;
            font-family: 'Outfit', sans-serif
        }

        .btn:hover {
            transform: scale(1.05)
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>✅ True or False</h1>
    <div class="stats">
        <span>Score: <b id="score">0</b></span>
        <span>Q: <b id="qnum">0</b>/15</span>
        <span>Streak: <b id="streak">0</b>🔥</span>
    </div>
    <div class="timer-bar">
        <div class="timer-fill" id="timerFill" style="width:100%"></div>
    </div>
    <div class="progress" id="progress"></div>
    <div class="category-badge" id="catBadge">Science</div>
    <div class="question" id="question">Press Start to begin!</div>
    <div class="choice-btns">
        <button class="choice-btn true-btn" id="trueBtn" disabled>✅ True</button>
        <button class="choice-btn false-btn" id="falseBtn" disabled>❌ False</button>
    </div>
    <div id="feedback"></div>
    <button class="btn" id="startBtn">▶ Start Game</button>
    <script>
        const QS = [
            { q: "The Earth is flat.", a: false, cat: "Science" }, { q: "Light travels faster than sound.", a: true, cat: "Physics" }, { q: "Diamonds are made of carbon.", a: true, cat: "Chemistry" }, { q: "The human body has 206 bones.", a: true, cat: "Biology" },
            { q: "Mount Everest is in Africa.", a: false, cat: "Geography" }, { q: "The Pacific is the largest ocean.", a: true, cat: "Geography" }, { q: "Spiders are insects.", a: false, cat: "Biology" }, { q: "Australia is both a country and a continent.", a: true, cat: "Geography" },
            { q: "Water boils at 100°C at sea level.", a: true, cat: "Science" }, { q: "The Great Wall of China is visible from space.", a: false, cat: "History" }, { q: "Bats are completely blind.", a: false, cat: "Biology" }, { q: "Lightning never strikes the same place twice.", a: false, cat: "Science" },
            { q: "The sun is a star.", a: true, cat: "Astronomy" }, { q: "Humans use only 10% of their brain.", a: false, cat: "Biology" }, { q: "Sharks are mammals.", a: false, cat: "Biology" }, { q: "Gold is denser than lead.", a: true, cat: "Chemistry" },
            { q: "The Amazon is the longest river in the world.", a: false, cat: "Geography" }, { q: "Rome is the capital of Italy.", a: true, cat: "Geography" }, { q: "Pi equals exactly 3.14.", a: false, cat: "Math" }, { q: "Sound can travel through a vacuum.", a: false, cat: "Physics" },
        ];

        let qs, qi, score, streak, timerInt, timeLeft, results, started = false;

        function shuffle(a) { return a.sort(() => Math.random() - .5); }

        function start() {
            qs = shuffle([...QS]).slice(0, 15); qi = 0; score = 0; streak = 0; results = []; started = true;
            document.getElementById('score').textContent = 0; document.getElementById('qnum').textContent = 0; document.getElementById('streak').textContent = 0;
            document.getElementById('startBtn').style.display = 'none'; document.getElementById('trueBtn').disabled = false; document.getElementById('falseBtn').disabled = false;
            buildProgress(); showQ();
        }

        function buildProgress() { const el = document.getElementById('progress'); el.innerHTML = ''; for (let i = 0; i < 15; i++) { const d = document.createElement('div'); d.className = 'prog-dot'; d.id = `dot-${i}`; el.appendChild(d); } }

        function showQ() {
            if (qi >= 15) { endGame(); return; }
            const q = qs[qi]; document.getElementById('catBadge').textContent = q.cat; document.getElementById('question').textContent = q.q; document.getElementById('feedback').textContent = ''; document.getElementById('qnum').textContent = qi + 1;
            document.getElementById('trueBtn').disabled = false; document.getElementById('falseBtn').disabled = false;
            timeLeft = 8; document.getElementById('timerFill').style.width = '100%'; clearInterval(timerInt);
            timerInt = setInterval(() => { timeLeft -= 0.1; document.getElementById('timerFill').style.width = Math.max(0, timeLeft / 8 * 100) + '%'; if (timeLeft <= 0) { clearInterval(timerInt); pick(null); } }, 100);
        }

        function pick(val) {
            clearInterval(timerInt);
            document.getElementById('trueBtn').disabled = true; document.getElementById('falseBtn').disabled = true;
            const q = qs[qi]; const correct = val === q.a;
            const dot = document.getElementById(`dot-${qi}`);
            if (correct) { score += 10 + Math.round(streak * 2); streak++; document.getElementById('feedback').textContent = `✅ Correct! +${10 + Math.round((streak - 1) * 2)} pts`; document.getElementById('feedback').style.color = '#22c55e'; dot.classList.add('correct'); }
            else { streak = 0; document.getElementById('feedback').textContent = val === null ? `⏰ Time's up! Answer: ${q.a ? 'True' : 'False'}` : `❌ Wrong! Answer: ${q.a ? 'True' : 'False'}`; document.getElementById('feedback').style.color = '#ef4444'; dot.classList.add('wrong'); }
            if (val !== null) { const btn = document.getElementById(val ? 'trueBtn' : 'falseBtn'); btn.classList.add(correct ? 'correct' : 'wrong'); setTimeout(() => btn.classList.remove(correct ? 'correct' : 'wrong'), 300); }
            document.getElementById('score').textContent = score; document.getElementById('streak').textContent = streak; qi++; setTimeout(showQ, 1100);
        }

        function endGame() {
            started = false; document.getElementById('question').textContent = `🏆 Done! Score: ${score}/150`; document.getElementById('startBtn').style.display = ''; document.getElementById('startBtn').textContent = '▶ Play Again';
        }

        document.getElementById('trueBtn').addEventListener('click', () => pick(true));
        document.getElementById('falseBtn').addEventListener('click', () => pick(false));
        document.getElementById('startBtn').addEventListener('click', start);
        document.addEventListener('keydown', e => { if (!started) return; if (e.key === 'ArrowLeft' || e.key === 't' || e.key === 'T') pick(true); if (e.key === 'ArrowRight' || e.key === 'f' || e.key === 'F') pick(false); });
    </script>
</body>

</html>
