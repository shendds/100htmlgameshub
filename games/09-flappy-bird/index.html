<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Flappy Bird | 100 HTML Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #fff
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #f59e0b, #eab308);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 32px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #64748b
        }

        .info span b {
            color: #f59e0b;
            font-size: 1.2em
        }

        canvas {
            border: 2px solid rgba(245, 158, 11, 0.3);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.1);
            cursor: pointer
        }

        #msg {
            margin-top: 14px;
            font-size: 1rem;
            color: #64748b;
            min-height: 24px;
            text-align: center
        }

        .btn {
            margin-top: 10px;
            padding: 10px 28px;
            background: linear-gradient(135deg, #f59e0b, #eab308);
            border: none;
            border-radius: 999px;
            color: #000;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s
        }

        .btn:hover {
            transform: scale(1.05)
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }

        .hint {
            font-size: 12px;
            color: #334155;
            margin-top: 8px
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🐦 Flappy Bird</h1>
    <div class="info">
        <span>Score: <b id="scoreDisp">0</b></span>
        <span>Best: <b id="highDisp">0</b></span>
    </div>
    <canvas id="c" width="340" height="500"></canvas>
    <div id="msg">Click or press SPACE to start</div>
    <button class="btn" id="startBtn">▶ Start</button>
    <div class="hint">Click or SPACE to flap</div>
    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d');
        const W = 340, H = 500, GRAVITY = 0.45, FLAP = -8, PIPE_W = 52, PIPE_GAP = 140, PIPE_SPD = 2.5;
        let bird, pipes, score, highScore = 0, running = false, animId, bgOff = 0;
        function init() { bird = { x: 80, y: H / 2, vy: 0, angle: 0, wing: 0 }; pipes = []; score = 0; setTimeout(function sp() { if (!running) return; const th = 60 + Math.random() * (H - PIPE_GAP - 120); pipes.push({ x: W + 10, th, by: th + PIPE_GAP, done: false }); setTimeout(sp, 1600); }, 1000); }
        function flap() { if (!running) { start(); return; } bird.vy = FLAP; bird.wing = 8; }
        function update() {
            bird.vy += GRAVITY; bird.y += bird.vy; bird.angle = Math.min(Math.PI / 2, Math.max(-0.5, bird.vy * 0.08)); if (bird.wing > 0) bird.wing--;
            bgOff = (bgOff + 2) % W;
            pipes.forEach(p => p.x -= PIPE_SPD); pipes = pipes.filter(p => p.x > -PIPE_W - 10);
            pipes.forEach(p => { if (!p.done && p.x + PIPE_W < bird.x) { p.done = true; score++; if (score > highScore) highScore = score; } });
            if (bird.y + 12 > H - 50 || bird.y - 12 < 0) { end(); return; }
            for (const p of pipes) { if (bird.x + 10 > p.x && bird.x - 10 < p.x + PIPE_W) { if (bird.y - 12 < p.th || bird.y + 12 > p.by) { end(); return; } } }
            document.getElementById('scoreDisp').textContent = score; document.getElementById('highDisp').textContent = highScore;
        }
        function drawPipe(x, th, by) { const g = ctx.createLinearGradient(x, 0, x + PIPE_W, 0); g.addColorStop(0, '#166534'); g.addColorStop(0.5, '#22c55e'); g.addColorStop(1, '#166534'); ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(x, 0, PIPE_W, th - 4, 4); ctx.fill(); ctx.fillStyle = '#15803d'; ctx.beginPath(); ctx.roundRect(x - 4, th - 20, PIPE_W + 8, 20, 4); ctx.fill(); ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(x, by + 20, PIPE_W, H - by, 4); ctx.fill(); ctx.fillStyle = '#15803d'; ctx.beginPath(); ctx.roundRect(x - 4, by, PIPE_W + 8, 20, 4); ctx.fill(); }
        function draw() {
            const sky = ctx.createLinearGradient(0, 0, 0, H); sky.addColorStop(0, '#0c1445'); sky.addColorStop(1, '#1e3a8a'); ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
            for (let i = 0; i < 20; i++) { ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.sin(Date.now() / 600 + i) * 0.15})`; ctx.beginPath(); ctx.arc((i * 53 + bgOff / 4) % W, (i * 37) % 180, 0.9, 0, Math.PI * 2); ctx.fill(); }
            ctx.fillStyle = '#15803d'; ctx.fillRect(0, H - 50, W, 50); ctx.fillStyle = '#14532d'; ctx.fillRect(0, H - 50, W, 8);
            pipes.forEach(p => drawPipe(p.x, p.th, p.by));
            ctx.save(); ctx.translate(bird.x, bird.y); ctx.rotate(bird.angle);
            ctx.fillStyle = '#eab308'; ctx.shadowColor = '#eab308'; ctx.shadowBlur = 12; ctx.beginPath(); ctx.ellipse(0, 0, 14, 11, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ca8a04'; ctx.beginPath(); ctx.ellipse(-2, bird.wing > 0 ? 8 : 4, 10, 6, 0.3, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(7, -3, 4, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#1e1b4b'; ctx.beginPath(); ctx.arc(8, -3, 2, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.moveTo(13, -1); ctx.lineTo(20, 1); ctx.lineTo(13, 3); ctx.fill(); ctx.restore();
            ctx.font = 'bold 30px Segoe UI'; ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fillText(score, W / 2, 48);
        }
        function end() { cancelAnimationFrame(animId); running = false; document.getElementById('msg').textContent = `💀 Game Over! Score: ${score}`; document.getElementById('startBtn').textContent = '↩ Play Again'; }
        function loop() { if (!running) return; update(); draw(); animId = requestAnimationFrame(loop); }
        function start() { cancelAnimationFrame(animId); init(); running = true; document.getElementById('msg').textContent = ''; document.getElementById('startBtn').textContent = '↩ Restart'; loop(); }
        c.addEventListener('click', flap);
        document.addEventListener('keydown', e => { if (e.key === ' ') { e.preventDefault(); flap(); } });
        document.getElementById('startBtn').addEventListener('click', () => { if (!running) start(); else flap(); });
        draw();
    </script>
</body>

</html>
