<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Pattern Memory | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 24px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ec4899, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #64748b
        }

        .info span b {
            color: #ec4899;
            font-size: 1.2em
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
            margin-bottom: 20px
        }

        .tile {
            border-radius: 14px;
            cursor: pointer;
            transition: all .15s;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem
        }

        .tile.off {
            background: rgba(255, 255, 255, 0.05)
        }

        .tile.on {
            box-shadow: 0 0 20px currentColor;
            transform: scale(1.05)
        }

        .tile.correct {
            animation: correct .3s ease
        }

        .tile.wrong {
            animation: wrong .3s ease
        }

        @keyframes correct {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.1)
            }
        }

        @keyframes wrong {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-6px)
            }

            75% {
                transform: translateX(6px)
            }
        }

        .btn {
            padding: 10px 28px;
            background: linear-gradient(135deg, #ec4899, #7c3aed);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s;
            font-family: 'Outfit', sans-serif
        }

        .btn:hover {
            transform: scale(1.05)
        }

        #msg {
            font-size: 1rem;
            min-height: 28px;
            text-align: center;
            margin-bottom: 12px;
            color: #64748b;
            font-weight: 700
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🧠 Pattern Memory</h1>
    <div class="info">
        <span>Level: <b id="level">1</b></span>
        <span>Score: <b id="score">0</b></span>
        <span>Best: <b id="best">0</b></span>
    </div>
    <div id="grid"></div>
    <div id="msg">Press Start to begin!</div>
    <button class="btn" id="startBtn">▶ Start</button>
    <script>
        const COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#7c3aed', '#ec4899', '#10b981', '#f59e0b', '#3b82f6', '#a855f7', '#84cc16', '#0ea5e9', '#fb7185', '#fbbf24', '#34d399'];
        const EMOJIS = ['🌟', '🔥', '💎', '🎵', '🌙', '⚡', '🌊', '🌸', '🍀', '🎯', '💫', '🏆', '🌈', '🍭', '🎪', '✨'];
        let pattern, userInput, level, score, best = 0, showing = false, canInput;

        function buildGrid() {
            const el = document.getElementById('grid'); el.innerHTML = '';
            for (let i = 0; i < 16; i++) { const t = document.createElement('div'); t.className = 'tile off'; t.style.background = 'rgba(255,255,255,0.05)'; t.dataset.idx = i; t.addEventListener('click', () => clickTile(i)); el.appendChild(t); }
        }

        function flashTile(i, on) {
            const t = document.querySelector(`[data-idx="${i}"]`); t.className = 'tile' + (on ? ' on' : 'off'); t.style.background = on ? COLORS[i] : 'rgba(255,255,255,0.05)'; t.style.color = on ? COLORS[i] : 'transparent'; t.style.borderColor = on ? COLORS[i] : 'rgba(255,255,255,0.1)'; if (on) t.textContent = EMOJIS[i]; else t.textContent = '';
        }

        async function showPattern() {
            showing = true; canInput = false; document.getElementById('msg').textContent = 'Watch the pattern...';
            for (const idx of pattern) { await sleep(300); flashTile(idx, true); await sleep(600); flashTile(idx, false); }
            await sleep(300); showing = false; canInput = true; userInput = []; document.getElementById('msg').textContent = `Repeat the ${pattern.length}-step pattern!`;
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function clickTile(i) {
            if (!canInput || showing) return;
            const t = document.querySelector(`[data-idx="${i}"]`); flashTile(i, true); setTimeout(() => flashTile(i, false), 300);
            userInput.push(i);
            const pos = userInput.length - 1;
            if (userInput[pos] !== pattern[pos]) {
                // wrong
                canInput = false; t.classList.add('wrong'); document.getElementById('msg').textContent = `❌ Wrong! The pattern had ${pattern.length} steps. Try again!`;
                score = 0; document.getElementById('score').textContent = 0; level = 1; document.getElementById('level').textContent = 1;
                setTimeout(() => { t.classList.remove('wrong'); pattern = [Math.floor(Math.random() * 16)]; showPattern(); }, 1000);
                return;
            }
            if (userInput.length === pattern.length) {
                // correct
                canInput = false; score += level * 10; if (score > best) { best = score; document.getElementById('best').textContent = best; } document.getElementById('score').textContent = score; level++; document.getElementById('level').textContent = level;
                document.getElementById('msg').textContent = `✅ Correct! Level ${level} next...`; pattern.push(Math.floor(Math.random() * 16)); setTimeout(showPattern, 1000);
            }
        }

        function start() { level = 1; score = 0; document.getElementById('score').textContent = 0; document.getElementById('level').textContent = 1; pattern = [Math.floor(Math.random() * 16)]; buildGrid(); showPattern(); }
        document.getElementById('startBtn').addEventListener('click', start);
        buildGrid();
    </script>
</body>

</html>
