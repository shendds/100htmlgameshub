<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Sudoku | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 16px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #06b6d4, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(9, 48px);
            gap: 2px;
            margin-bottom: 16px
        }

        .cell {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all .15s;
            color: #e2e8f0
        }

        .cell:focus {
            outline: none
        }

        .cell.given {
            color: #94a3b8;
            cursor: default;
            background: rgba(255, 255, 255, 0.02)
        }

        .cell.selected {
            background: rgba(124, 58, 237, 0.25);
            border-color: rgba(124, 58, 237, 0.6)
        }

        .cell.highlight {
            background: rgba(124, 58, 237, 0.08)
        }

        .cell.error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1)
        }

        .cell.box-right {
            border-right: 3px solid rgba(6, 182, 212, 0.4)
        }

        .cell.box-bottom {
            border-bottom: 3px solid rgba(6, 182, 212, 0.4)
        }

        .numpad {
            display: flex;
            gap: 8px;
            margin-bottom: 16px
        }

        .num-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: all .15s
        }

        .num-btn:hover {
            background: rgba(124, 58, 237, 0.3);
            border-color: rgba(124, 58, 237, 0.5)
        }

        .btns {
            display: flex;
            gap: 10px
        }

        .btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #06b6d4, #7c3aed);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s;
            font-family: 'Outfit', sans-serif
        }

        .btn:hover {
            transform: scale(1.05)
        }

        #msg {
            font-size: 1rem;
            min-height: 24px;
            margin-bottom: 12px;
            text-align: center;
            color: #64748b
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🔢 Sudoku</h1>
    <div id="grid"></div>
    <div class="numpad" id="numpad"></div>
    <div id="msg">Click a cell then enter a number</div>
    <div class="btns"><button class="btn" id="newBtn">▶ New Game</button><button class="btn" id="solveBtn"
            style="background:linear-gradient(135deg,#10b981,#06b6d4)">💡 Hint</button></div>
    <script>
        // Simple Sudoku generator/solver
        let puzzle = [], solution = [], userGrid = [], selected = -1;

        function solveSudoku(g) {
            const empty = g.reduce((a, v, i) => { if (v === 0) a.push(i); return a; }, []);
            function canPlace(g, idx, n) { const r = Math.floor(idx / 9), c = idx % 9; for (let i = 0; i < 9; i++) { if (g[r * 9 + i] === n || g[i * 9 + c] === n) return false; } const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3; for (let dr = 0; dr < 3; dr++)for (let dc = 0; dc < 3; dc++) { if (g[(br + dr) * 9 + (bc + dc)] === n) return false; } return true; }
            function solve(ei) { if (ei === empty.length) return true; const idx = empty[ei]; const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - .5); for (const n of nums) { if (canPlace(g, idx, n)) { g[idx] = n; if (solve(ei + 1)) return true; g[idx] = 0; } } return false; }
            return solve(0);
        }

        function generate() {
            solution = Array(81).fill(0); solveSudoku(solution);
            puzzle = [...solution];
            // Remove ~50 cells
            for (let i = 0; i < 50; i++) { let p; do { p = Math.floor(Math.random() * 81); } while (puzzle[p] === 0); puzzle[p] = 0; }
            userGrid = [...puzzle]; selected = -1; render(); document.getElementById('msg').textContent = 'Click a cell then enter a number';
        }

        function idx(r, c) { return r * 9 + c; }

        function render() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            for (let r = 0; r < 9; r++)for (let c = 0; c < 9; c++) {
                const i = idx(r, c); const cell = document.createElement('div'); cell.className = 'cell';
                if (puzzle[i] !== 0) { cell.classList.add('given'); cell.textContent = puzzle[i]; }
                else {
                    cell.textContent = userGrid[i] || '';
                    if (i === selected) cell.classList.add('selected');
                    if (userGrid[i] && userGrid[i] !== solution[i]) cell.classList.add('error');
                }
                if ((c + 1) % 3 === 0 && c < 8) cell.classList.add('box-right'); if ((r + 1) % 3 === 0 && r < 8) cell.classList.add('box-bottom');
                cell.addEventListener('click', () => { if (puzzle[i] !== 0) return; selected = i; render(); });
                grid.appendChild(cell);
            }
        }

        function enterNum(n) {
            if (selected < 0) return; const i = selected; if (puzzle[i] !== 0) return; userGrid[i] = n;
            if (userGrid.every((v, i) => v === solution[i])) { document.getElementById('msg').textContent = '🏆 Congratulations! Puzzle solved!'; }
            render();
        }

        // Numpad
        const np = document.getElementById('numpad');
        for (let n = 1; n <= 9; n++) { const b = document.createElement('button'); b.className = 'num-btn'; b.textContent = n; b.addEventListener('click', () => enterNum(n)); np.appendChild(b); }
        const del = document.createElement('button'); del.className = 'num-btn'; del.textContent = '✕'; del.addEventListener('click', () => enterNum(0)); np.appendChild(del);

        document.addEventListener('keydown', e => { if (e.key >= '1' && e.key <= '9') enterNum(parseInt(e.key)); if (e.key === 'Delete' || e.key === 'Backspace') enterNum(0); });
        document.getElementById('newBtn').addEventListener('click', generate);
        document.getElementById('solveBtn').addEventListener('click', () => { if (selected < 0) return; const i = selected; if (puzzle[i] !== 0) return; userGrid[i] = solution[i]; document.getElementById('msg').textContent = '💡 Hint applied!'; render(); });
        generate();
    </script>
</body>

</html>
