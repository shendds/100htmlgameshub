<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Animal Sound Quiz | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 24px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #64748b
        }

        .info span b {
            color: #f59e0b;
            font-size: 1.2em
        }

        .q-area {
            text-align: center;
            margin-bottom: 20px
        }

        .sound-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            border: none;
            font-size: 3rem;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            transition: all .2s;
            margin-bottom: 12px
        }

        .sound-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 32px rgba(245, 158, 11, 0.4)
        }

        .sound-btn:active {
            transform: scale(0.95)
        }

        .q-text {
            font-size: 1.1rem;
            color: #94a3b8
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 400px;
            width: 100%;
            margin-bottom: 16px
        }

        .opt {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            cursor: pointer;
            text-align: center;
            transition: all .15s;
            font-weight: 700;
            font-size: 1.2rem
        }

        .opt:hover {
            border-color: rgba(245, 158, 11, 0.5);
            background: rgba(245, 158, 11, 0.1);
            transform: scale(1.04)
        }

        .opt.correct {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.2)
        }

        .opt.wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.15)
        }

        #feedback {
            font-size: 1rem;
            font-weight: 700;
            min-height: 28px;
            text-align: center;
            margin-bottom: 10px;
            color: #64748b
        }

        .btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #f59e0b, #22c55e);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s;
            font-family: 'Outfit', sans-serif
        }

        .btn:hover {
            transform: scale(1.05)
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🐾 Animal Sound Quiz</h1>
    <div class="info"><span>Score: <b id="score">0</b></span><span>Q: <b id="qnum">0</b>/12</span><span>Streak: <b
                id="streak">0</b>🔥</span></div>
    <div class="q-area">
        <button class="sound-btn" id="soundBtn">🔊</button>
        <div class="q-text" id="qText">Which animal makes this sound?</div>
    </div>
    <div class="options" id="options"></div>
    <div id="feedback"></div>
    <button class="btn" id="startBtn">▶ Start</button>
    <script>
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const ANIMALS = [
            { name: 'Dog', emoji: '🐕', sound: 'Woof! Woof!', gen: (ctx) => { const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.setValueAtTime(300, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.1); o.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.3); const g = ctx.createGain(); g.gain.setValueAtTime(0.3, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.3); } },
            { name: 'Cat', emoji: '🐱', sound: 'Meow!', gen: (ctx) => { const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(500, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(700, ctx.currentTime + 0.2); o.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.5); const g = ctx.createGain(); g.gain.setValueAtTime(0.3, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.5); } },
            { name: 'Bird', emoji: '🐦', sound: 'Tweet!', gen: (ctx) => { const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(2000, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(3000, ctx.currentTime + 0.05); o.frequency.exponentialRampToValueAtTime(1800, ctx.currentTime + 0.1); const g = ctx.createGain(); g.gain.setValueAtTime(0.2, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.15); setTimeout(() => { const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.setValueAtTime(2200, ctx.currentTime); o2.frequency.exponentialRampToValueAtTime(3200, ctx.currentTime + 0.05); const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.2, ctx.currentTime); g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12); o2.connect(g2); g2.connect(ctx.destination); o2.start(); o2.stop(ctx.currentTime + 0.12); }, 200); } },
            { name: 'Cow', emoji: '🐄', sound: 'Moo!', gen: (ctx) => { const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.setValueAtTime(120, ctx.currentTime); o.frequency.linearRampToValueAtTime(150, ctx.currentTime + 0.5); const g = ctx.createGain(); g.gain.setValueAtTime(0.2, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.8); } },
            { name: 'Frog', emoji: '🐸', sound: 'Ribbit!', gen: (ctx) => { const o = ctx.createOscillator(); o.type = 'square'; o.frequency.setValueAtTime(200, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.05); o.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.15); const g = ctx.createGain(); g.gain.setValueAtTime(0.2, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.2); } },
            { name: 'Duck', emoji: '🦆', sound: 'Quack!', gen: (ctx) => { const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.setValueAtTime(400, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.05); o.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.12); const g = ctx.createGain(); g.gain.setValueAtTime(0.3, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.15); } },
            { name: 'Lion', emoji: '🦁', sound: 'Roar!', gen: (ctx) => { const buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++)d[i] = (Math.random() - 0.5) * 0.5 * Math.exp(-i / d.length * 3); const src = ctx.createBufferSource(); src.buffer = buf; const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 200; src.connect(lp); lp.connect(ctx.destination); src.start(); } },
            { name: 'Horse', emoji: '🐴', sound: 'Neigh!', gen: (ctx) => { const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.setValueAtTime(400, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.15); o.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.4); const g = ctx.createGain(); g.gain.setValueAtTime(0.3, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.5); } },
        ];

        let qs, qi, score = 0, streak = 0, current;
        function shuffle(a) { return a.sort(() => Math.random() - .5); }

        function start() { qs = shuffle([...ANIMALS, ...ANIMALS]).slice(0, 12); qi = 0; score = 0; streak = 0; document.getElementById('score').textContent = 0; document.getElementById('streak').textContent = 0; document.getElementById('startBtn').style.display = 'none'; nextQ(); }

        function nextQ() {
            if (qi >= 12) { document.getElementById('qText').textContent = `🏆 Final Score: ${score}`; document.getElementById('options').innerHTML = ''; document.getElementById('soundBtn').textContent = '🏆'; document.getElementById('startBtn').style.display = ''; document.getElementById('startBtn').textContent = '▶ Play Again'; return; }
            current = qs[qi]; document.getElementById('qnum').textContent = qi + 1; document.getElementById('qText').textContent = `Sound: "${current.sound}" — Which animal?`; document.getElementById('feedback').textContent = '';
            const decoys = shuffle(ANIMALS.filter(a => a.name !== current.name)).slice(0, 3);
            const choices = shuffle([current, ...decoys]);
            const opts = document.getElementById('options'); opts.innerHTML = '';
            choices.forEach(a => { const b = document.createElement('div'); b.className = 'opt'; b.innerHTML = `${a.emoji}<br>${a.name}`; b.addEventListener('click', () => pick(a.name, b)); opts.appendChild(b); });
            document.getElementById('soundBtn').onclick = () => current.gen(audio);
        }

        function pick(name, btn) {
            document.querySelectorAll('.opt').forEach(b => b.style.pointerEvents = 'none');
            if (name === current.name) { score += 10 + streak * 3; streak++; btn.classList.add('correct'); document.getElementById('feedback').textContent = '✅ Correct!'; document.getElementById('feedback').style.color = '#22c55e'; }
            else { streak = 0; btn.classList.add('wrong'); document.getElementById('feedback').textContent = `❌ It was ${current.emoji} ${current.name}!`; document.getElementById('feedback').style.color = '#ef4444'; }
            document.getElementById('score').textContent = score; document.getElementById('streak').textContent = streak; qi++; setTimeout(nextQ, 1000);
        }

        document.getElementById('startBtn').addEventListener('click', start);
    </script>
</body>

</html>
