<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Zombie Shooter | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 16px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #22c55e, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 24px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #64748b
        }

        .info span b {
            color: #22c55e;
            font-size: 1.2em
        }

        canvas {
            border: 2px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            background: #0a0806;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.1)
        }

        .btn {
            margin-top: 12px;
            padding: 10px 28px;
            background: linear-gradient(135deg, #22c55e, #ef4444);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: transform .15s
        }

        .btn:hover {
            transform: scale(1.05)
        }

        #msg {
            margin-top: 10px;
            font-size: 13px;
            color: #64748b;
            min-height: 22px;
            text-align: center
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🧟 Zombie Shooter</h1>
    <div class="info"><span>Score: <b id="score">0</b></span><span>HP: <b id="hp">100</b></span><span>Wave: <b
                id="wave">1</b></span></div>
    <canvas id="c" width="500" height="420"></canvas>
    <div id="msg">Click to shoot zombies! WASD to move.</div>
    <button class="btn" id="startBtn">▶ Start</button>
    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d'), W = 500, H = 420;
        let p, zombies, bullets, particles, score, hp, wave, running, animId, frame, mouseX = W / 2, mouseY = H / 2; const keys = {};

        function init() { p = { x: W / 2, y: H / 2 }; zombies = []; bullets = []; particles = []; score = 0; hp = 100; wave = 1; frame = 0; running = true; spawnWave();['score', 'wave'].forEach(id => document.getElementById(id).textContent = id === 'wave' ? 1 : 0); document.getElementById('hp').textContent = 100; document.getElementById('msg').textContent = ''; document.getElementById('startBtn').textContent = '↩ Restart'; }

        function spawnWave() { for (let i = 0; i < 4 + wave * 3; i++) { const angle = Math.random() * Math.PI * 2; const dist = 250 + Math.random() * 100; zombies.push({ x: p.x + Math.cos(angle) * dist, y: p.y + Math.sin(angle) * dist, hp: 2 + Math.floor(wave / 2), speed: 0.5 + Math.random() * 0.5 + wave * 0.1, r: 14 }); } }

        function update() {
            frame++; const sp = 3; if (keys.w || keys.ArrowUp) p.y = Math.max(12, p.y - sp); if (keys.s || keys.ArrowDown) p.y = Math.min(H - 12, p.y + sp); if (keys.a || keys.ArrowLeft) p.x = Math.max(12, p.x - sp); if (keys.d || keys.ArrowRight) p.x = Math.min(W - 12, p.x + sp);
            zombies.forEach(z => { const dx = p.x - z.x, dy = p.y - z.y, d = Math.hypot(dx, dy); if (d > 0) { z.x += dx / d * z.speed; z.y += dy / d * z.speed; } if (d < 20) { hp -= 1; document.getElementById('hp').textContent = Math.max(0, hp); if (hp <= 0) { running = false; document.getElementById('msg').textContent = `💀 Game Over! Score: ${score}`; } } });
            bullets.forEach(b => { b.x += b.vx; b.y += b.vy; zombies.forEach(z => { if (Math.hypot(b.x - z.x, b.y - z.y) < z.r + 4) { z.hp--; b.done = true; if (z.hp <= 0) { z.dead = true; score += 10; document.getElementById('score').textContent = score; for (let i = 0; i < 6; i++)particles.push({ x: z.x, y: z.y, vx: (Math.random() - .5) * 4, vy: (Math.random() - .5) * 4, life: 15, color: '#22c55e' }); } } }); });
            bullets = bullets.filter(b => !b.done && b.x > 0 && b.x < W && b.y > 0 && b.y < H); zombies = zombies.filter(z => !z.dead);
            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; }); particles = particles.filter(p => p.life > 0);
            if (zombies.length === 0 && running) { wave++; document.getElementById('wave').textContent = wave; hp = Math.min(100, hp + 20); document.getElementById('hp').textContent = hp; spawnWave(); }
        }

        function draw() {
            ctx.fillStyle = 'rgba(10,8,6,0.3)'; ctx.fillRect(0, 0, W, H);
            zombies.forEach(z => { ctx.fillStyle = '#22c55e'; ctx.shadowColor = '#22c55e'; ctx.shadowBlur = 8; ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '16px serif'; ctx.textAlign = 'center'; ctx.fillText('🧟', z.x, z.y + 6); });
            ctx.fillStyle = '#3b82f6'; ctx.shadowColor = '#3b82f6'; ctx.shadowBlur = 12; ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            bullets.forEach(b => { ctx.fillStyle = '#fcd34d'; ctx.shadowColor = '#f59e0b'; ctx.shadowBlur = 6; ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); ctx.fill(); }); ctx.shadowBlur = 0;
            particles.forEach(pr => { ctx.globalAlpha = pr.life / 15; ctx.fillStyle = pr.color; ctx.beginPath(); ctx.arc(pr.x, pr.y, 2, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; });
        }

        c.addEventListener('mousemove', e => { const r = c.getBoundingClientRect(); mouseX = e.clientX - r.left; mouseY = e.clientY - r.top; });
        c.addEventListener('click', () => { if (!running) return; const a = Math.atan2(mouseY - p.y, mouseX - p.x); bullets.push({ x: p.x, y: p.y, vx: Math.cos(a) * 10, vy: Math.sin(a) * 10 }); });
        document.addEventListener('keydown', e => { keys[e.key] = true; }); document.addEventListener('keyup', e => { keys[e.key] = false; });
        function loop() { if (!running) return; update(); draw(); animId = requestAnimationFrame(loop); }
        document.getElementById('startBtn').addEventListener('click', () => { cancelAnimationFrame(animId); init(); loop(); }); ctx.fillStyle = '#0a0806'; ctx.fillRect(0, 0, W, H);
    </script>
</body>

</html>
