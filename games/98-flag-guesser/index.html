<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Flag Guesser | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 24px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ef4444, #eab308, #22c55e, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #64748b
        }

        .info span b {
            color: #ef4444;
            font-size: 1.2em
        }

        .flag {
            font-size: 8rem;
            margin-bottom: 16px;
            line-height: 1;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.5)
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 400px;
            width: 100%;
            margin-bottom: 14px
        }

        .opt {
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            color: #cbd5e1;
            transition: all .15s
        }

        .opt:hover {
            border-color: rgba(239, 68, 68, 0.5);
            background: rgba(239, 68, 68, 0.1);
            transform: scale(1.03)
        }

        .opt.correct {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.2);
            color: #86efac
        }

        .opt.wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5
        }

        .timer-bar {
            width: 400px;
            max-width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 999px;
            margin-bottom: 12px;
            overflow: hidden
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #eab308);
            border-radius: 999px;
            transition: width .1s
        }

        #feedback {
            font-size: 1rem;
            font-weight: 700;
            min-height: 28px;
            text-align: center;
            margin-bottom: 8px;
            color: #64748b
        }

        .btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #ef4444, #eab308);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s;
            font-family: 'Outfit', sans-serif
        }

        .btn:hover {
            transform: scale(1.05)
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🏳️ Flag Guesser</h1>
    <div class="info"><span>Score: <b id="score">0</b></span><span>Q: <b id="qnum">0</b>/15</span><span>Streak: <b
                id="streak">0</b>🔥</span></div>
    <div class="timer-bar">
        <div class="timer-fill" id="timerFill" style="width:100%"></div>
    </div>
    <div class="flag" id="flag">🏁</div>
    <div class="options" id="options"></div>
    <div id="feedback">Press Start!</div>
    <button class="btn" id="startBtn">▶ Start</button>
    <script>
        const FLAGS = [
            { f: '🇺🇸', n: 'United States' }, { f: '🇬🇧', n: 'United Kingdom' }, { f: '🇫🇷', n: 'France' }, { f: '🇩🇪', n: 'Germany' }, { f: '🇯🇵', n: 'Japan' }, { f: '🇮🇹', n: 'Italy' }, { f: '🇪🇸', n: 'Spain' }, { f: '🇧🇷', n: 'Brazil' }, { f: '🇨🇦', n: 'Canada' }, { f: '🇦🇺', n: 'Australia' },
            { f: '🇲🇽', n: 'Mexico' }, { f: '🇰🇷', n: 'South Korea' }, { f: '🇮🇳', n: 'India' }, { f: '🇷🇺', n: 'Russia' }, { f: '🇨🇳', n: 'China' }, { f: '🇹🇷', n: 'Turkey' }, { f: '🇸🇦', n: 'Saudi Arabia' }, { f: '🇿🇦', n: 'South Africa' }, { f: '🇳🇬', n: 'Nigeria' }, { f: '🇦🇷', n: 'Argentina' },
            { f: '🇸🇪', n: 'Sweden' }, { f: '🇳🇴', n: 'Norway' }, { f: '🇩🇰', n: 'Denmark' }, { f: '🇫🇮', n: 'Finland' }, { f: '🇵🇹', n: 'Portugal' }, { f: '🇬🇷', n: 'Greece' }, { f: '🇪🇬', n: 'Egypt' }, { f: '🇹🇭', n: 'Thailand' }, { f: '🇻🇳', n: 'Vietnam' }, { f: '🇵🇱', n: 'Poland' },
        ];
        let qs, qi, score = 0, streak = 0, timerInt;
        function shuffle(a) { return a.sort(() => Math.random() - .5); }

        function start() { qs = shuffle([...FLAGS]).slice(0, 15); qi = 0; score = 0; streak = 0; document.getElementById('score').textContent = 0; document.getElementById('streak').textContent = 0; document.getElementById('startBtn').style.display = 'none'; nextQ(); }

        function nextQ() {
            if (qi >= 15) { document.getElementById('flag').textContent = '🏆'; document.getElementById('options').innerHTML = ''; document.getElementById('feedback').textContent = `🏆 Final Score: ${score}`; document.getElementById('startBtn').style.display = ''; document.getElementById('startBtn').textContent = '▶ Play Again'; return; }
            const q = qs[qi]; document.getElementById('flag').textContent = q.f; document.getElementById('qnum').textContent = qi + 1; document.getElementById('feedback').textContent = '';
            const decoys = shuffle(FLAGS.filter(f => f.n !== q.n)).slice(0, 3); const choices = shuffle([q, ...decoys]);
            const opts = document.getElementById('options'); opts.innerHTML = '';
            choices.forEach(c => { const b = document.createElement('div'); b.className = 'opt'; b.textContent = c.n; b.addEventListener('click', () => pick(c.n, q.n, b)); opts.appendChild(b); });
            let timeLeft = 8; document.getElementById('timerFill').style.width = '100%'; clearInterval(timerInt); timerInt = setInterval(() => { timeLeft -= 0.1; document.getElementById('timerFill').style.width = Math.max(0, timeLeft / 8 * 100) + '%'; if (timeLeft <= 0) { clearInterval(timerInt); streak = 0; document.getElementById('streak').textContent = 0; document.getElementById('feedback').textContent = `⏰ It was ${q.n}`; document.getElementById('feedback').style.color = '#ef4444'; qi++; setTimeout(nextQ, 1000); } }, 100);
        }

        function pick(val, ans, btn) {
            clearInterval(timerInt); document.querySelectorAll('.opt').forEach(b => b.style.pointerEvents = 'none');
            if (val === ans) { score += 10 + streak * 3; streak++; btn.classList.add('correct'); document.getElementById('feedback').textContent = '✅ Correct!'; document.getElementById('feedback').style.color = '#22c55e'; }
            else { streak = 0; btn.classList.add('wrong'); document.getElementById('feedback').textContent = `❌ It was ${ans}`; document.getElementById('feedback').style.color = '#ef4444'; }
            document.getElementById('score').textContent = score; document.getElementById('streak').textContent = streak; qi++; setTimeout(nextQ, 1000);
        }

        document.getElementById('startBtn').addEventListener('click', start);
    </script>
</body>

</html>
