<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Tower of Hanoi | 100 HTML Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 24px
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ef4444, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .info {
            display: flex;
            gap: 24px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #64748b
        }

        .info span b {
            color: #ef4444;
            font-size: 1.2em
        }

        .towers {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            align-items: flex-end
        }

        .tower-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer
        }

        .tower-label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: 700
        }

        .tower-area {
            width: 160px;
            height: 220px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            justify-content: flex-start;
            padding-bottom: 0;
            position: relative
        }

        .peg {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 210px;
            background: linear-gradient(to top, #7c3aed, #a78bfa);
            border-radius: 4px;
            z-index: 0
        }

        .base {
            width: 160px;
            height: 12px;
            background: linear-gradient(to right, #4c1d95, #7c3aed, #4c1d95);
            border-radius: 6px
        }

        .disk {
            border-radius: 8px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            margin: 2px 0;
            position: relative;
            z-index: 1;
            transition: all .2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3)
        }

        .tower-wrap.selected .peg {
            background: linear-gradient(to top, #f59e0b, #fde047);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.5)
        }

        .tower-wrap.selected .base {
            background: linear-gradient(to right, #78350f, #f59e0b, #78350f)
        }

        .disk.selected-disk {
            box-shadow: 0 0 18px currentColor;
            transform: translateY(-8px)
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center
        }

        .btn {
            padding: 10px 22px;
            background: linear-gradient(135deg, #ef4444, #f97316);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s;
            font-family: 'Outfit', sans-serif
        }

        .btn.secondary {
            background: linear-gradient(135deg, #475569, #64748b);
            padding: 8px 18px;
            font-size: 13px
        }

        .btn:hover {
            transform: scale(1.05)
        }

        #msg {
            font-size: 1rem;
            min-height: 24px;
            text-align: center;
            margin-bottom: 12px;
            color: #64748b;
            font-weight: 700
        }

        .back {
            position: fixed;
            top: 16px;
            left: 16px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 999px
        }

        .back:hover {
            color: #fff
        }

        .hint {
            font-size: 12px;
            color: #334155;
            margin-top: 8px
        }
    </style>
</head>

<body>
    <a href="../../index.html" class="back">← Back to Menu</a>
    <h1>🗼 Tower of Hanoi</h1>
    <div class="info">
        <span>Moves: <b id="moves">0</b></span>
        <span>Min Moves: <b id="minMoves">7</b></span>
        <span>Disks: <b id="diskCount">3</b></span>
    </div>
    <div class="towers" id="towers"></div>
    <div id="msg">Click a tower to pick up/place disks</div>
    <div class="controls">
        <button class="btn secondary" id="disk3Btn">3 Disks</button>
        <button class="btn secondary" id="disk4Btn">4 Disks</button>
        <button class="btn secondary" id="disk5Btn">5 Disks</button>
        <button class="btn" id="resetBtn">↩ Reset</button>
    </div>
    <div class="hint">Move all disks to the rightmost peg. Larger disk cannot go on top of smaller.</div>
    <script>
        const COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4'];
        let towers, numDisks = 3, selected, moves;

        function init(n) {
            numDisks = n; towers = [[], [], ...[[]]]; towers = [...Array(3)].map(() => []);
            for (let i = n; i >= 1; i--)towers[0].push(i);
            selected = null; moves = 0;
            document.getElementById('moves').textContent = 0; document.getElementById('diskCount').textContent = n; document.getElementById('minMoves').textContent = Math.pow(2, n) - 1; document.getElementById('msg').textContent = 'Click a tower to pick up or place a disk';
            render();
        }

        function click(idx) {
            if (selected === null) { if (towers[idx].length === 0) return; selected = idx; document.getElementById('msg').textContent = `Disk picked from Tower ${idx + 1}. Click destination.`; }
            else {
                if (idx === selected) { selected = null; document.getElementById('msg').textContent = 'Click a tower to pick up or place a disk'; render(); return; }
                const top = towers[idx][towers[idx].length - 1]; const moving = towers[selected][towers[selected].length - 1];
                if (top && top < moving) { document.getElementById('msg').textContent = '❌ Cannot place a larger disk on a smaller one!'; selected = null; render(); return; }
                towers[idx].push(towers[selected].pop()); moves++; document.getElementById('moves').textContent = moves; selected = null;
                if (towers[2].length === numDisks) { document.getElementById('msg').textContent = `🏆 Solved in ${moves} moves! Min: ${Math.pow(2, numDisks) - 1}`; }
                else document.getElementById('msg').textContent = 'Click a tower to continue';
            }
            render();
        }

        function render() {
            const el = document.getElementById('towers'); el.innerHTML = '';
            towers.forEach((tower, ti) => {
                const wrap = document.createElement('div'); wrap.className = 'tower-wrap' + (selected === ti ? ' selected' : '');
                const lbl = document.createElement('div'); lbl.className = 'tower-label'; lbl.textContent = `Tower ${ti + 1}`;
                const area = document.createElement('div'); area.className = 'tower-area';
                const peg = document.createElement('div'); peg.className = 'peg'; area.appendChild(peg);
                tower.forEach((d, di) => {
                    const disk = document.createElement('div'); disk.className = 'disk';
                    const w = 40 + d * 20; disk.style.width = w + 'px'; disk.style.background = `linear-gradient(to right, ${COLORS[d - 1]}aa, ${COLORS[d - 1]}, ${COLORS[d - 1]}aa)`;
                    disk.textContent = d; area.appendChild(disk);
                });
                const base = document.createElement('div'); base.className = 'base';
                wrap.appendChild(lbl); wrap.appendChild(area); wrap.appendChild(base); wrap.addEventListener('click', () => click(ti));
                el.appendChild(wrap);
            });
        }

        document.getElementById('disk3Btn').addEventListener('click', () => init(3));
        document.getElementById('disk4Btn').addEventListener('click', () => init(4));
        document.getElementById('disk5Btn').addEventListener('click', () => init(5));
        document.getElementById('resetBtn').addEventListener('click', () => init(numDisks));
        init(3);
    </script>
</body>

</html>
